<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>アマフリ管理</title>
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="アマフリ管理">
  <meta name="theme-color" content="#FFFFFF">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <link rel="apple-touch-icon" href="icon.PNG">
  <link rel="stylesheet" href="css/style.css?v=20260517">
</head>
<body>
  <div id="app">
    <header id="header">
      <button id="back-btn" class="header-btn back-circle hidden" onclick="App.goBack()">‹ 戻る</button>
      <h1 id="page-title">商品</h1>
      <div style="grid-column:3;justify-self:end;display:flex;align-items:center;gap:6px;padding-bottom:8px;">
        <span id="sync-indicator" title="" style="font-size:16px;line-height:1;"></span>
        <div id="action-slot"></div>
      </div>
    </header>

    <main id="main"></main>

    <nav id="tab-bar">
      <button class="tab-btn active" data-tab="products" onclick="App.switchTab('products')">
        <svg viewBox="0 0 24 24"><path d="M20 6h-2.18c.07-.44.18-.88.18-1.36C18 2.09 15.91 0 13.27 0c-1.54 0-2.91.7-3.82 1.77C8.55.7 7.18 0 5.64 0 3.03 0 .91 2.09.91 4.64c0 .48.11.92.18 1.36H-.01v14h20.01V6zm-7.82-4.64c1.48 0 2.73 1.21 2.73 2.64S13.65 6.64 12.18 6.64 9.46 5.43 9.46 4c0-1.43 1.27-2.64 2.72-2.64zM5.64 2c1.48 0 2.73 1.21 2.73 2.64S7.12 7.28 5.64 7.28 2.91 6.07 2.91 4.64C2.91 3.21 4.16 2 5.64 2zM18 18H2V8h4l5.5 1 5.5-1h4v10H18z"/></svg>
        <span>商品</span>
      </button>
      <button class="tab-btn" data-tab="csv" onclick="App.switchTab('csv')">
        <svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.89 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm4 18H6V4h7v5h5v11zM8 15h8v2H8v-2zm0-4h8v2H8v-2z"/></svg>
        <span>CSV</span>
      </button>
      <button class="tab-btn" data-tab="settings" onclick="App.switchTab('settings')">
        <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
        <span>設定</span>
      </button>
    </nav>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast hidden"></div>

  <!-- Sheet overlay -->
  <div id="sheet-overlay" class="sheet-overlay hidden" onclick="App.hideSheet()"></div>
  <div id="sheet" class="sheet hidden"></div>

  <!-- Confirm overlay -->
  <div id="confirm-overlay" class="sheet-overlay hidden">
    <div class="confirm-box">
      <p id="confirm-msg" style="font-size:15px;line-height:1.6;padding:20px 20px 16px;text-align:center;color:#333;"></p>
      <div style="display:flex;border-top:1px solid #eee;">
        <button id="confirm-cancel" style="flex:1;padding:16px;font-size:16px;color:#888;border:none;background:none;border-right:1px solid #eee;">キャンセル</button>
        <button id="confirm-ok" style="flex:1;padding:16px;font-size:16px;font-weight:700;color:#E53935;border:none;background:none;">OK</button>
      </div>
    </div>
  </div>

  <script src="js/app.js?v=20260517"></script>
  <script>
    fetch('./version.json?_=' + Date.now(), {cache: 'no-store'})
      .then(function(r){ return r.json(); })
      .then(function(d){
        var old = localStorage.getItem('amafuri_ver');
        localStorage.setItem('amafuri_ver', d.v);
        if (old && old !== d.v) { location.reload(true); }
      }).catch(function(){});
  </script>
</body>
</html>
