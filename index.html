<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>アマフリ比較表</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <nav class="navbar">
      <div class="navbar-brand">
        <span class="brand-a">アマ</span><span class="brand-f">フリ</span>比較表
      </div>
      <button class="navbar-toggle" id="navToggle" aria-label="メニュー">
        <span></span><span></span><span></span>
      </button>
      <div class="navbar-menu" id="navMenu">
        <a class="nav-item" data-page="overview">📊 一覧</a>
        <a class="nav-item" data-page="master">📦 商品マスター</a>
        <a class="nav-item" data-page="inventory">🏭 在庫入力</a>
        <a class="nav-item" data-page="csv-import">📥 CSV読込</a>
        <a class="nav-item" data-page="settings">⚙️ 設定</a>
      </div>
    </nav>

    <main id="pageContent" class="main-content"></main>
  </div>

  <!-- Modal -->
  <div id="modal" class="modal-overlay hidden" role="dialog" aria-modal="true">
    <div class="modal-box">
      <div class="modal-header">
        <h2 id="modalTitle" class="modal-title"></h2>
        <button class="modal-close-btn" id="modalClose" aria-label="閉じる">×</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer" id="modalFooter"></div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toastContainer" class="toast-container" aria-live="polite"></div>

  <script src="js/storage.js"></script>
  <script src="js/sync.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/pages/overview.js"></script>
  <script src="js/pages/master.js"></script>
  <script src="js/pages/inventory.js"></script>
  <script src="js/pages/csv-import.js"></script>
  <script src="js/pages/detail.js"></script>
  <script src="js/pages/settings.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
