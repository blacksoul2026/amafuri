      <div class="navbar-menu" id="navMenu">
        <a class="nav-item" data-page="overview">📊 一覧</a>
        <a class="nav-item" data-page="master">📦 商品マスター</a>
        <a class="nav-item" data-page="inventory">🏭 在庫入力</a>

      navigator.serviceWorker.register('sw.js').then(function(reg) {
